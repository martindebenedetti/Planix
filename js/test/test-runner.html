<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planix - Jasmine Test Runner</title>

    <!-- Jasmine CSS -->
    <link rel="shortcut icon"
          type="image/png"
          href="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.10.0/jasmine_favicon.png">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.10.0/jasmine.min.css">

    <!-- Jasmine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.10.0/jasmine.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.10.0/jasmine-html.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.10.0/boot0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jasmine/5.10.0/boot1.min.js"></script>

    <style>
        body { margin: 0; padding: 0; }
    </style>
</head>

<body>

    <script>
        // Evita comportamientos automáticos no deseados durante los tests.
        window.TESTING_MODE = true;
    </script>

    <!-- DOM mínimo requerido por js/script.js -->
    <div id="test-fixture" style="display: none;">

        <form id="form-crear-proyecto">
            <input id="p-nombre" type="text">
            <input id="p-inicio" type="text">
            <input id="p-fin" type="text">
            <button type="submit">Crear proyecto</button>
        </form>

        <form id="form-nueva-tarea">
            <input id="t-nombre" type="text">
            <input id="t-responsable" type="text">

            <select id="t-estado">
                <option value="">Seleccionar estado</option>
                <option value="pendiente">Pendiente</option>
                <option value="en curso">En curso</option>
                <option value="completada">Completada</option>
            </select>

            <button type="submit">Agregar tarea</button>
        </form>

        <select id="select-proyecto">
            <option value="">Seleccionar proyecto</option>
        </select>

        <select id="filtro-tareas">
            <option value="todas">Todas</option>
            <option value="pendiente">Pendientes</option>
            <option value="en curso">En curso</option>
            <option value="completada">Completadas</option>
        </select>

        <table>
            <tbody id="cuerpo-tabla"></tbody>
        </table>

        <div id="barra-avance"></div>
        <div id="texto-estado-proyecto"></div>
        <div id="contenedor-alertas"></div>

    </div>

    <!-- Código fuente -->
    <script src="../utils/storage.js"></script>
    <script src="../models/Tarea.js"></script>
    <script src="../models/Proyecto.js"></script>
    <script src="../models/GestorProyectos.js"></script>
    <script src="../script.js"></script>

    <!-- Tests actualmente compatibles -->
    <script src="./models.spec.js"></script>
    <script src="./storage.spec.js"></script>
    <script src="./script.spec.js"></script>

</body>
</html>
